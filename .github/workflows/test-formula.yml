name: test-formula

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@98cfa07b984a61682e6cd3a0833fad2006cc84ba # master @ 2026-04-22
      - name: Tap local checkout
        run: brew tap nkootstra/smll "$(pwd)"
      - name: brew audit --strict
        run: brew audit --strict --online nkootstra/smll/smll
      - name: brew install
        run: brew install --verbose nkootstra/smll/smll
      - name: brew test
        run: brew test nkootstra/smll/smll
      - name: brew uninstall
        run: brew uninstall nkootstra/smll/smll
